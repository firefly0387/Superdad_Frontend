<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />

    <!-- Primary SEO -->
    <title>SuperDad | Premium Baby & Kids Store in Nepal</title>

    <meta
      name="description"
      content="Shop premium baby clothing, toys, diapers, feeding essentials, and kids accessories at SuperDad. Quality products with fast delivery across Nepal."
    />

    <meta name="author" content="SuperDad" />

    <meta name="robots" content="index, follow" />

    <meta name="theme-color" content="#ffffff" />

    <!-- Canonical -->
    <link rel="canonical" href="https://superdadshop.com/" />

    <!-- Icons -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="SuperDad" />
    <meta
      property="og:title"
      content="SuperDad | Premium Baby & Kids Store in Nepal"
    />
    <meta
      property="og:description"
      content="Premium baby clothing, toys, diapers, feeding essentials, and kids accessories."
    />
    <meta property="og:url" content="https://superdadshop.com/" />
    <meta
      property="og:image"
      content="https://superdadshop.com/og-image.jpg"
    />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="SuperDad | Premium Baby & Kids Store in Nepal"
    />
    <meta
      name="twitter:description"
      content="Premium baby clothing, toys, diapers, feeding essentials, and kids accessories."
    />
    <meta
      name="twitter:image"
      content="https://superdadshop.com/og-image.jpg"
    />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Store",
        "name": "SuperDad",
        "url": "https://superdadshop.com/"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
